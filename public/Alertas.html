<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/gridjs/dist/theme/mermaid.min.css" rel="stylesheet" />   
    <link rel="stylesheet" href="../styles.css">
    <title>Alertas - Alpha 1 </title>
</head>
<body>

    <div id="overlay" class="overlay"></div>


 <main class="dashboard">
  <!-- FILTROS -->
  <section class="panel full">
    <div class="panel-header">
      <h5>Filtros</h5>
      <button class="btn btn-light">Limpiar filtros</button>
    </div>

    <div class="filters">
      <input id = "searchClient "type="text" placeholder="Buscar por cliente o ID">

      <input type="date">
      <input type="date">

      <select>
        <option>Selecciona Tipo de Alerta</option>
        <option>{TIPO ALERTA 1 }</option>
        <option>{TIPO ALERTA 2 }</option>
        <option>{TIPO ALERTA 3 }</option>
        <option>{TIPO ALERTA 4 }</option>
      </select>



      <select>
        <option>Estatus</option>
        <option>En Revision </option>
        <option>Cerrado </option>
        <option>Abierto </option>
      </select>

      <button class="btn btn-dark"> Filtrar </button>
    </div>
  </section>

  <!-- TABLA PRINCIPAL -->
  <section class="panel full-page">
    <div class="panel-header">
      <h5>Listado de Alertas</h5>
    </div>

    <div id="alertas-table"></div>

  </section>

  
</main>
    <script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>
    <script src="../script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

</body>
</html>
